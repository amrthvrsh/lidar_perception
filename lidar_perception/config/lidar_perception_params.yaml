# ==============================================================================
# LiDAR Perception Pipeline Parameters
# Topic chain:
#   /sensing/lidar/top/pointcloud_raw
#     -> roi_crop_filter   -> /lidar/points_roi
#     -> voxel_grid_filter -> /lidar/points_downsampled
#     -> ground_removal    -> /lidar/points_obstacle
#     -> euclidean_cluster -> /lidar/clusters
#     -> obb_estimator     -> /lidar/cluster_boxes  (MarkerArray)
#     -> object_tracker    -> /lidar/tracked_objects (BoundingBox3DArray)
#     -> sensor_fusion     -> /fusion/objects, /fusion/visualization
# ==============================================================================

roi_crop_filter_node:
  ros__parameters:
    input_topic:  /sensing/lidar/concatenated/pointcloud
    output_topic: /lidar/points_roi
    x_min: 0.0
    x_max: 50.0
    y_min: -20.0
    y_max: 20.0
    z_min: -2.0
    z_max: 3.0

voxel_grid_filter_node:
  ros__parameters:
    input_topic:  /lidar/points_roi
    output_topic: /lidar/points_downsampled
    leaf_size: 0.1

ground_removal_node:
  ros__parameters:
    input_topic:     /lidar/points_downsampled
    obstacle_topic:  /lidar/points_obstacle
    ground_topic:    /lidar/points_ground
    n_segments:      72
    max_slope:       0.35
    height_threshold: 0.20
    min_range:       2.5
    max_range:       100.0
    initial_seed_height: -9999.0

euclidean_cluster_node:
  ros__parameters:
    input_topic:       /lidar/points_obstacle
    cluster_topic:     /lidar/clusters
    marker_topic:      /lidar/cluster_boxes
    cluster_tolerance: 0.75
    min_cluster_size:  10
    max_cluster_size:  15000
    roi_max_range:     50.0
